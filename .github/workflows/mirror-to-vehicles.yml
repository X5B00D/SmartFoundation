name: Mirror to SmartFoundationVehicles

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.MIRROR_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Test SSH authentication
        run: |
          ssh -v -T git@github.com || true

      - name: Mirror push to destination (SSH)
        run: |
          git remote remove mirror 2>/dev/null || true
          git remote add mirror git@github.com:X5B00D/SmartFoundationVehicles.git
          git push --mirror mirror
