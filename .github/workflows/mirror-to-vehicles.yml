name: Mirror to SmartFoundationVehicles

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check token is present
        run: |
          if [ -z "${{ secrets.MIRROR_TOKEN }}" ]; then
            echo "MIRROR_TOKEN is EMPTY or NOT AVAILABLE to this workflow"
            exit 1
          else
            echo "MIRROR_TOKEN is present ✅"
          fi

      - name: Mirror push to destination
        run: |
          git remote remove mirror 2>/dev/null || true
          git remote add mirror https://x-access-token:${{ secrets.MIRROR_TOKEN }}@github.com/X5B00D/SmartFoundationVehicles.git
          git push --mirror mirror
